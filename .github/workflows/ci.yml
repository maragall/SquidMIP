name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Clean-room install: resolves deps from PyPI only (no ambient conda env, no
      # tilefusion). Proves the build is reproducible off the dev machine.
      - name: Install
        run: python -m pip install --upgrade pip && pip install .[test]
      # Integration tests need the real hongquan dataset, which isn't on CI -> deselect.
      - name: Test
        run: pytest -m "not integration" -v

  # The FOV_ROI_table (IMA-231) is hand-written rather than produced by ngio, so that the runtime
  # stays lean and `requires-python` stays at 3.10. That trade is only safe if the real consumer
  # validates the output — this job is that proof. It is SEPARATE from the matrix above because
  # ngio needs Python >= 3.11: installing it on the 3.10 leg would fail at the install step and
  # take every other test down with it.
  oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with the ngio oracle)
        run: python -m pip install --upgrade pip && pip install .[test,oracle]
      - name: ROI table interop
        run: pytest -m "not integration" -v -k "roi or ngio or anndata or table"
