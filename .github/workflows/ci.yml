name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Clean-room install: resolves deps from PyPI only (no ambient conda env, no
      # tilefusion). Proves the build is reproducible off the dev machine.
      - name: Install
        run: python -m pip install --upgrade pip && pip install .[test]
      # No [gui] extra here on purpose (clean-room, headless): tests/test_viewer.py importorskips
      # PyQt5. The Qt regression net runs — and is asserted NOT to skip — in build.yml's smoke job.
      # Integration tests need the real hongquan dataset, which isn't on CI -> deselect.
      - name: Test
        run: pytest -m "not integration" -v
