name: build

# Freeze the HCS viewer into openable desktop artifacts (Linux AppImage + Windows + macOS),
# mirroring maragall/ndviewer_light and maragall/stitcher. The `smoke` job is the dependency-import
# check requested — it fails CI if the runtime deps don't import cleanly on any OS.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  # ---- dependency-import smoke + tests (all 3 OSes) --------------------------------------------
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with GUI extra + ndviewer_light)
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/maragall/ndviewer_light"
          pip install ".[gui,test]"
      - name: Dependency-import smoke (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/smoke_import.py
      - name: Tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q --ignore=tests/test_performance.py
      # The Qt viewer tests are the layer-stack regression net (IMA-227), and they skip WHOLESALE
      # when PySide is present in the process (a green build that ran nothing). This is the only
      # job that installs the [gui] extra, so it is the one that must prove they actually ran.
      - name: Qt viewer tests must run, not skip
        env:
          QT_QPA_PLATFORM: offscreen
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        shell: bash
        run: |
          set -o pipefail
          pytest tests/test_viewer.py tests/test_layers.py -q -rs | tee qt.log
          grep -qE "[0-9]+ passed" qt.log || { echo "::error::no Qt viewer tests ran"; exit 1; }
          if grep -qi "skipped" qt.log; then echo "::error::Qt viewer tests SKIPPED"; exit 1; fi

  # ---- freeze the GUI per OS via PyInstaller ---------------------------------------------------
  freeze:
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (+ PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/maragall/ndviewer_light"
          pip install ".[gui]" pyinstaller
      - name: Freeze hcs-viewer
        run: >
          pyinstaller --noconfirm --windowed --name hcs-viewer
          --collect-all ndviewer_light --collect-all ndv --collect-all tensorstore
          --collect-all imageio_ffmpeg --collect-submodules squidmip
          -c scripts/hcs_viewer_entry.py
      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: |
          # AppImage packaging of dist/hcs-viewer (linuxdeploy). Best-effort; validated on the first CI run.
          echo "AppImage packaging step — wire linuxdeploy here (see maragall/ndviewer_light CI)."
      - uses: actions/upload-artifact@v4
        with:
          name: hcs-viewer-${{ matrix.os }}
          path: dist/*
          if-no-files-found: warn
